<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mini App Cuan</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    .box {
      margin-top: 80px;
    }

    h2 {
      color: orange;
    }

    button {
      padding: 15px 25px;
      background: orange;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      color: black;
    }

    #ads {
      margin-top: 30px;
      padding: 20px;
      background: #222;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Mini App Cuan 🚀</h2>
  <p>Klik tombol di bawah untuk lihat iklan</p>

  <button onclick="showAd()">Tampilkan Iklan</button>

  <div id="ads"></div>
</div>

<script>
  function showAd() {
    document.getElementById("ads").innerHTML = `
      
      <script type="text/javascript">
        atOptions = {
          'key' : '5685535',
          'format' : 'iframe',
          'height' : 50,
          'width' : 320
        };
      <\/script>
      <script src="//www.topcreativeformat.com/5685535/invoke.js"><\/script>

    `;
  }

  let tg = window.Telegram.WebApp;
  tg.expand();
</script>

</body>
</html>
