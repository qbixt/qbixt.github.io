<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGC ULTRA APP</title><style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#020617;color:#fff}

.header{display:flex;align-items:center;gap:10px;padding:12px}
.avatar{width:45px;height:45px;border-radius:50%;border:2px solid #00f0ff}

.container{padding:15px;padding-bottom:110px}
.card{background:#0f172a;padding:15px;border-radius:14px;margin-bottom:12px}

.balance{font-size:22px;font-weight:bold}

.tap{
width:200px;height:200px;border-radius:50%;
display:block;margin:20px auto;
box-shadow:0 0 30px #00f0ff;
transition:.1s;
}
.tap:active{transform:scale(.85)}

.btn{
width:100%;padding:12px;border:none;border-radius:10px;margin-top:8px;
background:#2563eb;color:#fff;font-weight:bold
}

.nav{
position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
width:92%;display:flex;justify-content:space-around;
padding:10px;background:#0f172a;border-radius:15px
}
.nav button{background:none;border:none;color:#fff;font-size:18px}

.reward{position:fixed;font-size:20px;animation:up 1s forwards}
@keyframes up{to{opacity:0;transform:translateY(-60px)}}

.wheel{
width:200px;height:200px;border-radius:50%;margin:auto;
background:conic-gradient(#3b82f6,#9333ea,#00f0ff,#10b981,#f59e0b,#ef4444);
transition:4s
}

.hidden{display:none}
</style></head><body><div class="header">
<img id="avatar" class="avatar" src="https://i.imgur.com/t2O7FMa.png">
<div id="name">User</div>
</div><div class="container"><!-- HOME --><div id="home">
<div class="card">
<div class="balance">💰 <span id="bal">0</span> BGC</div>
<div>Tap Left: <span id="tapLeft">50</span></div>
</div><div class="card">
<div id="wheel" class="wheel"></div>
<button class="btn" onclick="spin()">SPIN</button>
</div><img src="https://i.imgur.com/t2O7FMa.png" class="tap" onclick="tap(event)"><div class="card">
<h3>BOOST</h3>
<button class="btn" onclick="boost(100,50)">100⭐ +50</button>
<button class="btn" onclick="boost(300,200)">300⭐ +200</button>
<button class="btn" onclick="boost(500,400)">500⭐ +400</button>
</div>
</div><!-- TASK --><div id="task" class="hidden">
<div class="card">
<button class="btn" onclick="ads(5)">Ads +5⭐</button>
<button class="btn" onclick="ads(10)">Ads +10⭐</button>
</div>
</div><!-- WALLET --><div id="wallet" class="hidden">
<div class="card">
<p>BGC: <span id="w1"></span></p>
<p>STAR: <span id="w2"></span></p>
</div>
</div></div><div class="nav">
<button onclick="nav('home')">🏠</button>
<button onclick="nav('task')">📋</button>
<button onclick="nav('wallet')">💳</button>
</div><script>
let bal=Number(localStorage.getItem('bal'))||0
let star=Number(localStorage.getItem('star'))||0
let used=Number(localStorage.getItem('used'))||0
let limit=Number(localStorage.getItem('limit'))||50
let angle=0

// TELEGRAM
if(window.Telegram){
let u=window.Telegram.WebApp.initDataUnsafe.user
if(u){
document.getElementById('name').innerText=u.first_name
if(u.photo_url)document.getElementById('avatar').src=u.photo_url
}
}

function save(){
localStorage.setItem('bal',bal)
localStorage.setItem('star',star)
localStorage.setItem('used',used)
localStorage.setItem('limit',limit)
}

function update(){
val('bal',bal)
val('tapLeft',limit-used)
val('w1',bal)
val('w2',star)
}

function val(id,v){document.getElementById(id).innerText=v}

function tap(e){
if(used>=limit)return alert('limit habis')
bal++;used++
spawn(e.clientX,e.clientY)
save();update()
}

function spawn(x,y){
let el=document.createElement('div')
el.className='reward'
el.innerText='+1'
el.style.left=x+'px'
el.style.top=y+'px'
document.body.appendChild(el)
setTimeout(()=>el.remove(),1000)
}

function spin(){
let w=document.getElementById('wheel')
let r=360*5+Math.random()*360
angle+=r
w.style.transform='rotate('+angle+'deg)'

setTimeout(()=>{
let win=Math.floor(Math.random()*50)+10
bal+=win
alert('WIN '+win)
save();update()
},4000)
}

function boost(c,a){
if(star<c)return alert('star kurang')
star-=c
limit+=a
save();update()
}

function ads(x){star+=x;save();update()}

function nav(p){
document.querySelectorAll('#home,#task,#wallet').forEach(e=>e.classList.add('hidden'))
document.getElementById(p).classList.remove('hidden')
}

update()
</script></body>
</html>
