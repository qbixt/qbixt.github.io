<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>BGC Mini App</title>

<style>
body{margin:0;background:#0b0f14;color:#fff;font-family:system-ui;overflow:hidden}
.hidden{display:none}
.page{position:absolute;inset:0;padding:16px}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%}
.avatar{width:70px;height:70px;border-radius:50%}
#tapLogo{width:110px;animation:float 2s ease-in-out infinite}
@keyframes float{50%{transform:translateY(-10px)}}
.spinBtn{position:absolute;right:20px;top:50%;background:#00e0ff;color:#000;padding:10px;border-radius:12px;font-weight:bold}
.nav{position:absolute;bottom:0;width:100%;display:flex;justify-content:space-around;background:#111;padding:12px 0}
.nav div{font-size:13px}
button{background:#00e0ff;border:none;padding:10px 14px;border-radius:10px;margin:6px;font-weight:bold}

/* spin */
.spinWrap{height:220px;overflow:hidden;position:relative;background:#101826;border-radius:16px}
.pointer{position:absolute;left:50%;transform:translateX(-50%);font-size:28px}
.wheel{display:flex;gap:12px;position:absolute;top:80px;left:0}
.box{min-width:80px;height:80px;background:#152233;border-radius:12px;display:flex;align-items:center;justify-content:center}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page">
 <div class="center">
   <img id="ava" class="avatar"/>
   <div id="name"></div><br>
   <img src="logo.png" id="tapLogo" onclick="tap()"/>
   <div>Tap Left: <span id="tapLeft">50</span></div>
   <div class="spinBtn" onclick="openSpin()">SPIN</div>
 </div>
</div>

<!-- SPIN -->
<div id="spin" class="page hidden">
 <div class="spinWrap">
   <div class="pointer">▼</div>
   <div class="wheel" id="wheel"></div>
 </div>
 <div style="text-align:center;margin-top:20px">
   <button onclick="freeSpin()">Free Spin</button><br>
   <button onclick="paidSpin(50,5)">50⭐ = 5 Spin</button>
   <button onclick="paidSpin(100,15)">100⭐ = 15 Spin</button>
   <button onclick="paidSpin(300,50)">300⭐ = 50 Spin</button>
   <button onclick="paidSpin(500,100)">500⭐ = 100 Spin</button><br>
   <button onclick="backHome()">Back</button>
 </div>
</div>

<!-- TASK -->
<div id="task" class="page hidden">
 <h3>Task</h3>
 <button onclick="join()">Join Channel</button><br>
 <button onclick="ads(5)">10 Ads = 5⭐</button>
 <button onclick="ads(13)">20 Ads = 13⭐</button>
 <button onclick="ads(35)">50 Ads = 35⭐</button>
 <button onclick="ads(90)">100 Ads = 90⭐</button>
</div>

<!-- INVITE -->
<div id="invite" class="page hidden">
 <h3>Invite Reward</h3>
 <button onclick="invite(10)">5 Invite = 10 BGC</button>
 <button onclick="invite(30)">15 Invite = 30 BGC</button>
 <button onclick="invite(75)">30 Invite = 75 BGC</button>
 <button onclick="invite(130)">50 Invite = 130 BGC</button>
</div>

<!-- NFT -->
<div id="nft" class="page hidden">
 <h3>NFT Market</h3>
 <div>NFT #1 🔥</div>
 <div>NFT #2 💎</div>
</div>

<!-- WALLET -->
<div id="wallet" class="page hidden">
 <h3>Wallet</h3>
 BGC: <span id="wbgc">0</span><br>
 STAR: <span id="wstar">0</span><br>
 USDT: <span id="wusdt">0</span><br><br>

 <h4>Exchange</h4>
 <button onclick="exchange()">100 BGC → $1.3</button><br>

 <h4>Boost Tap (12 jam)</h4>
 <button onclick="boost(100,50)">100⭐ +50 Tap</button>
 <button onclick="boost(300,200)">300⭐ +200 Tap</button>
 <button onclick="boost(500,400)">500⭐ +400 Tap</button>
 <button onclick="boost(1000,1200)">1000⭐ +1200 Tap</button><br><br>

 <button onclick="window.open('https://t.me/qbitx')">Customer Service</button>
</div>

<!-- NAV -->
<div class="nav">
 <div onclick="show('home')">Home</div>
 <div onclick="show('task')">Task</div>
 <div onclick="show('invite')">Invite</div>
 <div onclick="show('nft')">NFT</div>
 <div onclick="show('wallet')">Wallet</div>
</div>

<script>
const tg=window.Telegram.WebApp;tg.expand();
const u=tg.initDataUnsafe.user||{};
ava.src=u.photo_url||"https://i.imgur.com/6VBx3io.png";
name.innerText=u.first_name||"User";

// STATE
let S=JSON.parse(localStorage.getItem("bgc")||`{"bgc":0,"star":0,"tap":50,"lastSpin":0,"boost":0}`);
function save(){localStorage.setItem("bgc",JSON.stringify(S));update()}
function update(){
 tapLeft.innerText=S.tap;
 wbgc.innerText=S.bgc;
 wstar.innerText=S.star;
 wusdt.innerText=S.usdt||0;
}
update();

// TAP anti spam
let tapLock=false;
function tap(){
 if(tapLock||S.tap<=0)return;
 tapLock=true;
 S.tap--;S.bgc++;save();
 setTimeout(()=>tapLock=false,200);
}

// SPIN
const rewards=["1⭐","3⭐","5⭐","10⭐","2 BGC","5 BGC","10 BGC","50 BGC","0.5 TON","$1 USDT"];
const wheel=document.getElementById("wheel");
for(let i=0;i<40;i++){
 rewards.forEach(r=>{
  const d=document.createElement("div");
  d.className="box"; d.innerText=r;
  wheel.appendChild(d);
 });
}

let spinning=false, spinLeft=0;

function runSpin(){
 if(spinning||spinLeft<=0)return;
 spinning=true; spinLeft--;

 const move=-(Math.random()*3000+3000);
 wheel.style.transition="4s cubic-bezier(.17,.67,.24,1)";
 wheel.style.transform=`translateX(${move}px)`;

 setTimeout(()=>{
  S.star+=5; save();
  spinning=false;
 },4000);
}

function freeSpin(){
 if(Date.now()-S.lastSpin<86400000)return alert("Sudah spin hari ini");
 S.lastSpin=Date.now(); spinLeft=1; runSpin();
}

function paidSpin(cost,qty){
 if(S.star<cost)return;
 S.star-=cost; spinLeft+=qty; save();
 runSpin();
}

// TASK
function ads(r){S.star+=r;save()}
function join(){window.open('https://t.me/yourchannel')}

// INVITE
function invite(r){S.bgc+=r;save()}

// BOOST
function boost(cost,add){
 if(S.star<cost)return;
 S.star-=cost; S.tap+=add; save();
}

// EXCHANGE
function exchange(){
 if(S.bgc>=100){
  S.bgc-=100; S.usdt=(S.usdt||0)+1.3; save();
 }
}

function openSpin(){show('spin')}
function backHome(){show('home')}
function show(id){
 ['home','spin','task','invite','nft','wallet'].forEach(x=>document.getElementById(x).classList.add('hidden'));
 document.getElementById(id).classList.remove('hidden');
}
</script>

</body>
   </html>
