<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGC App</title>

<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#0f172a,#020617);
color:white;
}

.header{
display:flex;
align-items:center;
gap:10px;
padding:10px;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#333;
}

.container{
padding:15px;
padding-bottom:100px;
}

.card{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:15px;
margin-bottom:10px;
}

.tap{
width:180px;
height:180px;
border-radius:50%;
display:block;
margin:20px auto;
object-fit:cover;
background:#000;
padding:10px;
animation:glow 2s infinite;
transition:0.1s;
}

.tap:active{
transform:scale(0.9) rotate(10deg);
}

@keyframes glow{
0%{box-shadow:0 0 20px #9333ea;}
50%{box-shadow:0 0 60px #00f0ff;}
100%{box-shadow:0 0 20px #9333ea;}
}

.btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-weight:bold;
}

.nav{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
width:90%;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:20px;
display:flex;
justify-content:space-around;
padding:10px;
}

.nav button{
background:none;
border:none;
color:white;
font-size:18px;
}

.hidden{display:none;}

.coin{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.nft-box{
display:flex;
gap:10px;
}

.nft{
flex:1;
background:#111;
padding:10px;
border-radius:10px;
text-align:center;
}

@keyframes fly{
0%{opacity:1;transform:translateY(0);}
100%{opacity:0;transform:translateY(-60px);}
}
</style>
</head>

<body>

<div class="header">
<div class="avatar"></div>
<div id="username">User</div>
</div>

<div class="container">

<!-- HOME -->
<div id="home">
<div class="card">
<h3 id="balanceText">Balance: <span id="balance">0</span> BGC</h3>
<p id="tapText">Tap Left: <span id="tapLeft">50</span></p>
</div>

<button class="btn" id="spinText" onclick="spin()">🎁 Spin Reward</button>

<img src="https://i.imgur.com/t2O7FMa.png" class="tap" onclick="tap(event)">
</div>

<!-- TASK -->
<div id="task" class="hidden">
<div class="card">
<h3>📋 Tasks</h3>
<button class="btn" onclick="window.open('https://t.me/BGC7COMMUNITY')">
Join Channel (+10)
</button>
</div>
</div>

<!-- INVITE -->
<div id="invite" class="hidden">
<div class="card">
<h3>👥 Invite</h3>
<p>1 = 5 BGC</p>
<p>3 = 18 BGC</p>
<p>10 = 80 BGC</p>
</div>
</div>

<!-- NFT -->
<div id="nft" class="hidden">
<div class="card">
<h3>💎 NFT Market</h3>
<div class="nft-box">
<div class="nft">NFT #1 🔥</div>
<div class="nft">NFT #2 💎</div>
</div>
<button class="btn">Mint NFT</button>
</div>
</div>

<!-- WALLET -->
<div id="wallet" class="hidden">

<div class="card">
<h3>💳 Wallet</h3>
<p><b id="balance2">0</b> BGC</p>
</div>

<div class="card">
<h3>💱 Market</h3>
<div class="coin">BTC <span>$65,200</span></div>
<div class="coin">ETH <span>$3,200</span></div>
<div class="coin">USDT <span>$1.00</span></div>
<div class="coin">TON <span>$5.2</span></div>
<div class="coin">BNB <span>$580</span></div>
</div>

<div class="card">
<p>500 BGC = 1 TON</p>
<p style="opacity:0.5;">Withdraw Coming Soon</p>
</div>

</div>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="showPage('home')">🏠</button>
<button onclick="showPage('task')">📋</button>
<button onclick="showPage('invite')">👥</button>
<button onclick="showPage('nft')">💎</button>
<button onclick="showPage('wallet')">💳</button>
</div>

<script>

// ===== TELEGRAM USER =====
let tg = window.Telegram.WebApp;
let userData = tg && tg.initDataUnsafe ? tg.initDataUnsafe.user : null;

let name = "Guest";
let userLang = "en";

if(userData){
name = userData.username ? userData.username : userData.first_name;
userLang = userData.language_code || "en";
}

// ===== LANGUAGE =====
let text = {
en:{
balance:"Balance",
tap:"Tap Left",
spin:"Spin Reward"
},
id:{
balance:"Saldo",
tap:"Sisa Tap",
spin:"Putar Hadiah"
}
};

let lang = text[userLang] || text["en"];

// ===== DATA =====
let balance = Number(localStorage.getItem("bal"))||0;
let used = Number(localStorage.getItem("used"))||0;
let last = Number(localStorage.getItem("last"))||0;
let limit = 50;

// ===== SAVE =====
function save(){
localStorage.setItem("bal",balance);
localStorage.setItem("used",used);
localStorage.setItem("last",last);
}

// ===== UPDATE UI =====
function update(){
document.getElementById("balance").innerText=balance;
document.getElementById("balance2").innerText=balance;
document.getElementById("tapLeft").innerText=limit-used;
}

// ===== TAP =====
function tap(e){

if(Date.now()-last>43200000){
used=0;
last=Date.now();
}

if(used>=limit){
alert("Limit habis 12 jam");
return;
}

balance++;
used++;

spawn(e.clientX,e.clientY);

navigator.vibrate(30);

save();
update();
}

// ===== EFFECT =====
function spawn(x,y){
let el=document.createElement("div");
el.innerText="+1";
el.style.position="fixed";
el.style.left=x+"px";
el.style.top=y+"px";
el.style.color="#00f0ff";
el.style.fontWeight="bold";
el.style.animation="fly 1s forwards";
document.body.appendChild(el);
setTimeout(()=>el.remove(),1000);
}

// ===== SPIN =====
function spin(){
let r=Math.floor(Math.random()*50)+10;
balance+=r;
alert("Dapet "+r+" BGC 🎉");
save();
update();
}

// ===== NAV =====
function showPage(p){
document.querySelectorAll("#home,#task,#invite,#nft,#wallet").forEach(el=>el.classList.add("hidden"));
document.getElementById(p).classList.remove("hidden");
}

// ===== LOAD =====
window.onload=function(){

document.getElementById("username").innerText=name;

document.getElementById("balanceText").innerText=lang.balance+": "+balance+" BGC";
document.getElementById("tapText").innerText=lang.tap+": "+(limit-used);
document.getElementById("spinText").innerText="🎁 "+lang.spin;

update();

};
alert(window.Telegram);
</script>

</body>
</html>
