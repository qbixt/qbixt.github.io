<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>BGC Mini App</title>

<style>
body{
 margin:0;
 font-family:Arial,Helvetica,sans-serif;
 background:radial-gradient(circle at top,#0b0f18,#05070d);
 color:#fff; overflow:hidden;
}

/* LOADING */
#loading{
 position:fixed; inset:0; z-index:999;
 background:#05070d; display:flex;
 align-items:center; justify-content:center;
 flex-direction:column; font-size:28px;
 letter-spacing:4px;
}
.loader{
 margin-top:20px; width:60px; height:60px;
 border-radius:50%;
 border:6px solid #111;
 border-top:6px solid #00e0ff;
 animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* HEADER */
.header{
 position:absolute; top:15px; left:15px; right:15px;
 display:flex; justify-content:space-between; align-items:center;
}
.profile{display:flex; gap:10px; align-items:center;}
.profile img{width:44px;height:44px;border-radius:50%;}
.spinBtn{
 padding:8px 16px; border-radius:20px;
 background:linear-gradient(45deg,#00e0ff,#a100ff);
 font-weight:bold;
}

/* TAP */
.center{
 position:absolute; top:52%; left:50%;
 transform:translate(-50%,-50%);
 text-align:center;
}
#tapLogo{
 width:140px;
 animation:float 3s ease-in-out infinite;
 filter:drop-shadow(0 0 20px #00e0ff);
}
#tapLogo:active{transform:scale(.9)}
@keyframes float{50%{transform:translateY(-12px)}}

.coin{
 position:absolute; color:#00e0ff; font-weight:bold;
 animation:fly 1s forwards;
}
@keyframes fly{to{transform:translateY(-80px);opacity:0}}

/* NAV */
.nav{
 position:absolute; bottom:10px; left:0; right:0;
 display:flex; justify-content:space-around;
 font-size:14px;
}
.nav div{opacity:.5}
.nav div.active{opacity:1;color:#00e0ff}

/* PAGE */
.page{
 position:fixed; inset:0;
 background:#0b0f18; display:none;
 padding:20px; overflow:auto;
}
button{
 width:100%; padding:14px; margin:8px 0;
 border:none; border-radius:14px;
 background:linear-gradient(45deg,#00e0ff,#a100ff);
 color:#fff; font-weight:bold;
}

/* SPIN */
.spinWrap{position:relative;width:300px;height:300px;margin:40px auto;}
.pointer{
 position:absolute; top:-10px; left:50%;
 transform:translateX(-50%);
 border-left:18px solid transparent;
 border-right:18px solid transparent;
 border-bottom:40px solid #fff;
 filter:drop-shadow(0 0 10px #00e0ff);
 z-index:10;
}
#wheel{
 width:100%;height:100%;
 border-radius:50%;
 border:8px solid #111;
 background:conic-gradient(#00e0ff,#a100ff,#00e0ff,#a100ff,#00e0ff,#a100ff,#00e0ff,#a100ff);
 transition:transform 5s cubic-bezier(.17,.67,.33,1);
}
</style>
</head>
<body>

<div id="loading">BGC LOADING<div class="loader"></div></div>

<div class="header">
 <div class="profile">
  <img id="pp"><div id="name">Player</div>
 </div>
 <div class="spinBtn" onclick="openSpin()">SPIN</div>
</div>

<div class="center" id="tapArea">
 <img src="logo.png" id="tapLogo" onclick="tap(event)">
 <div>Tap Left: <span id="tapLeft">50</span></div>
 <button onclick="openBoost()">BOOST</button>
</div>

<div class="nav">
 <div class="active">Home</div>
 <div onclick="openTask()">Task</div>
 <div onclick="openInvite()">Invite</div>
 <div onclick="openNFT()">NFT</div>
 <div onclick="openWallet()">Wallet</div>
</div>

<!-- SPIN -->
<div class="page" id="spinPage">
 <div class="spinWrap">
  <div class="pointer"></div>
  <div id="wheel"></div>
 </div>
 <button onclick="spinWheel()">SPIN NOW</button>
 <button onclick="closeSpin()">BACK</button>
</div>

<!-- BOOST -->
<div class="page" id="boostPage">
 <h3>Boost 12 Jam</h3>
 <button onclick="buyBoost(50)">+50 Tap</button>
 <button onclick="buyBoost(200)">+200 Tap</button>
 <button onclick="closeBoost()">BACK</button>
</div>

<!-- TASK -->
<div class="page" id="taskPage">
 <h3>Task</h3>
 <button>Join Community</button>
 <button>Watch Ads</button>
 <button onclick="closeTask()">BACK</button>
</div>

<!-- INVITE -->
<div class="page" id="invitePage">
 <h3>Invite</h3>
 <button>Copy Referral</button>
 <button onclick="closeInvite()">BACK</button>
</div>

<!-- NFT -->
<div class="page" id="nftPage">
 <h3>NFT Market</h3>
 <button>NFT #1 🔥</button>
 <button>NFT #2 💎</button>
 <button onclick="closeNFT()">BACK</button>
</div>

<!-- WALLET -->
<div class="page" id="walletPage">
 <h3>Wallet</h3>
 <button onclick="openW('balance')">Balance</button>
 <button onclick="openW('exchange')">Exchange</button>
 <button onclick="openW('market')">Market</button>
 <button onclick="openW('deposit')">Deposit</button>
 <button onclick="openW('withdraw')">Withdraw</button>
 <button onclick="window.open('https://t.me/qbitx')">Customer Service</button>
 <button onclick="closeWallet()">BACK</button>
</div>

<!-- WALLET INNER -->
<div class="page" id="w_balance">
 <h3>Total Balance</h3>
 <div>BGC : 0</div>
 <div>STAR : 0</div>
 <button onclick="backWallet()">BACK</button>
</div>

<div class="page" id="w_exchange">
 <h3>Exchange</h3>
 <button>USDT → STAR</button>
 <button>TON → STAR</button>
 <button>BGC → STAR</button>
 <button onclick="backWallet()">BACK</button>
</div>

<div class="page" id="w_market">
 <h3>Market</h3>
 <div>BGC : $1.3 / 100 BGC</div>
 <button onclick="backWallet()">BACK</button>
</div>

<div class="page" id="w_deposit">
 <h3>Deposit</h3>
 <div>Minimal $5</div>
 <button onclick="backWallet()">BACK</button>
</div>

<div class="page" id="w_withdraw">
 <h3>Withdraw</h3>
 <div>Masukkan alamat wallet</div>
 <button onclick="backWallet()">BACK</button>
</div>

<script>
let tg=window.Telegram.WebApp; tg.expand();
setTimeout(()=>loading.style.display="none",5000);

name.innerText=tg.initDataUnsafe.user.first_name||"Player";
pp.src=`https://t.me/i/userpic/320/${tg.initDataUnsafe.user.username}.jpg`;

let S={tap:50,lastSpin:0,lastBoost:0};

function tap(e){
 if(S.tap<=0)return;
 S.tap--; tapLeft.innerText=S.tap;
 let c=document.createElement("div");
 c.className="coin"; c.innerText="+1";
 c.style.left="60px"; c.style.top="40px";
 tapArea.appendChild(c);
 setTimeout(()=>c.remove(),1000);
}

function openSpin(){spinPage.style.display="block"}
function closeSpin(){spinPage.style.display="none"}

function spinWheel(){
 if(Date.now()-S.lastSpin<86400000) return alert("Free spin sudah dipakai");
 S.lastSpin=Date.now();
 let deg=360*6+Math.random()*360;
 wheel.style.transform=`rotate(-${deg}deg)`;
}

function openBoost(){boostPage.style.display="block"}
function closeBoost(){boostPage.style.display="none"}
function buyBoost(add){
 if(Date.now()-S.lastBoost<43200000) return alert("Boost cooldown");
 S.tap+=add; tapLeft.innerText=S.tap;
 S.lastBoost=Date.now();
}

function openTask(){taskPage.style.display="block"}
function closeTask(){taskPage.style.display="none"}
function openInvite(){invitePage.style.display="block"}
function closeInvite(){invitePage.style.display="none"}
function openNFT(){nftPage.style.display="block"}
function closeNFT(){nftPage.style.display="none"}
function openWallet(){walletPage.style.display="block"}
function closeWallet(){walletPage.style.display="none"}

function openW(x){
 walletPage.style.display="none";
 document.getElementById("w_"+x).style.display="block";
}
function backWallet(){
 document.querySelectorAll('[id^="w_"]').forEach(e=>e.style.display="none");
 walletPage.style.display="block";
}
</script>

</body>
</html>
