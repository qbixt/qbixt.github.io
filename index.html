<!DOCTYPE html><html>
<head>
  <meta charset="UTF-8">
  <title>BGC App</title>  <!-- WAJIB BIAR NORMAL DI HP -->  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <!-- TELEGRAM -->  <script src="https://telegram.org/js/telegram-web-app.js"></script>  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .container {
      padding: 15px;
      padding-bottom: 80px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-size: 16px;
    }

    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #1e293b;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
    }

    .nav button {
      background: none;
      border: none;
      color: white;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }
  </style></head><body><div class="container">  <!-- HOME -->  <div id="home">
    <div class="card">
      <h2>BGC Dashboard</h2>
      <p>Balance: <span id="balance">0</span> BGC</p>
      <p>Level: 1</p>
    </div><div class="card">
  <button class="btn" onclick="claimDaily()">🎁 Claim Daily (+30)</button>
  <button class="btn" onclick="showPage('tasks')">🚀 Start Mission</button>
</div>

  </div>  <!-- TASK -->  <div id="tasks" class="hidden">
    <div class="card">
      <h3>Mission</h3>
      <button class="btn" onclick="addBalance(50)">Join Channel (+50)</button>
      <button class="btn" onclick="addBalance(20)">Visit Website (+20)</button>
    </div>
  </div>  <!-- INVITE -->  <div id="invite" class="hidden">
    <div class="card">
      <h3>Invite Friends</h3>
      <p>Invite = +200 BGC</p>
      <button class="btn" onclick="invite()">Copy Link</button>
    </div>
  </div></div><!-- NAVBAR --><div class="nav">
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('tasks')">Tasks</button>
  <button onclick="showPage('invite')">Invite</button>
</div><script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  // SIMPAN BALANCE BIAR GAK RESET
  let balance = localStorage.getItem("bgc") || 0;

  function updateUI() {
    document.getElementById("balance").innerText = balance;
  }

  function addBalance(amount) {
    balance = Number(balance) + amount;
    localStorage.setItem("bgc", balance);
    updateUI();
    alert("+" + amount + " BGC");
  }

  function claimDaily() {
    balance = Number(balance) + 30;
    localStorage.setItem("bgc", balance);
    updateUI();
    alert("Daily claimed!");
  }

  function invite() {
    const link = "https://t.me/bgc7_bot";
    navigator.clipboard.writeText(link);
    alert("Link copied!");
  }

  function showPage(page) {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("tasks").classList.add("hidden");
    document.getElementById("invite").classList.add("hidden");

    document.getElementById(page).classList.remove("hidden");
  }

  updateUI();
</script></body>
</html>
