<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGC APP</title>

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.hidden{display:none;}

.header{
padding:15px;
background:linear-gradient(90deg,#0f172a,#020617);
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#555;
}

.name{font-weight:bold;}

.card{
background:#0f172a;
margin:10px;
padding:15px;
border-radius:15px;
}

.tap{
width:180px;
height:180px;
border-radius:50%;
display:block;
margin:20px auto;
box-shadow:0 0 40px #9333ea;
transition:0.1s;
}

.tap:active{
transform:scale(0.9) rotate(5deg);
}

.btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
}

.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

.nav button{
background:none;
color:white;
border:none;
}

.coin{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #222;
}

@keyframes fly{
0%{opacity:1;transform:translateY(0);}
100%{opacity:0;transform:translateY(-50px);}
}
</style>
</head>

<body>

<!-- START -->
<div id="start" style="text-align:center;margin-top:100px;">
<h1>BGC PROJECT 🚀</h1>
<img src="https://i.imgur.com/8Km9tLL.png" width="120"><br><br>

<button class="btn" onclick="startApp()">START BOT</button>

<a href="https://t.me/BGC7COMMUNITY">
<button class="btn">JOIN CHANNEL</button>
</a>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="header">
<div class="avatar"></div>
<div class="name" id="username">Player</div>
</div>

<!-- HOME -->
<div id="home">

<div class="card">
<h3>Balance: <span id="balance">0</span> BGC</h3>
<p>Tap Left: <span id="tapLeft">50</span></p>
</div>

<img src="https://i.imgur.com/8Km9tLL.png" class="tap" onclick="tap(event)">

<button class="btn" onclick="watchAds()">🎥 Mission (+5 BGC)</button>

</div>

<!-- TASK -->
<div id="task" class="hidden">

<div class="card">
<h3>Tasks</h3>
<a href="https://t.me/BGC7COMMUNITY">
<button class="btn">Join Channel (+10)</button>
</a>
<button class="btn" onclick="daily()">Daily Reward (+30)</button>
</div>

<div class="card">
<h3>Invite</h3>
<p>1 = 5 BGC</p>
<p>3 = 18 BGC</p>
<p>10 = 80 BGC</p>
</div>

</div>

<!-- WALLET -->
<div id="wallet" class="hidden">

<div class="card">
<h3>Balance</h3>
<p id="usd">$0</p>
</div>

<div class="card">
<h3>Exchange</h3>
<p>500 BGC = 1 TON</p>
</div>

<div class="card">
<h3>Market</h3>

<div class="coin">BTC <span>$68,000 📈</span></div>
<div class="coin">ETH <span>$3,200 📉</span></div>
<div class="coin">TON <span>$5.20 📈</span></div>
<div class="coin">BNB <span>$400 📈</span></div>
<div class="coin">USDT <span>$1.00</span></div>

</div>

<div class="card">
🚫 Withdraw Coming Soon
</div>

</div>

</div>

<!-- NAV -->
<div class="nav hidden" id="nav">
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('task')">Tasks</button>
<button onclick="showPage('wallet')">Wallet</button>
</div>

<script>

let balance = Number(localStorage.getItem("bal"))||0;
let tapUsed = Number(localStorage.getItem("tap"))||0;
let last = Number(localStorage.getItem("time"))||Date.now();
let limit = 50;

function startApp(){
document.getElementById("start").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
document.getElementById("nav").classList.remove("hidden");
update();
}

function tap(e){
if(Date.now()-last>43200000){tapUsed=0;last=Date.now();}

if(tapUsed>=limit){
alert("Limit habis");
return;
}

balance++;
tapUsed++;

spawn(e.clientX,e.clientY);

save();update();
}

function spawn(x,y){
let el=document.createElement("div");
el.innerText="+1";
el.style.position="fixed";
el.style.left=x+"px";
el.style.top=y+"px";
el.style.color="#22c55e";
el.style.animation="fly 1s forwards";
document.body.appendChild(el);
setTimeout(()=>el.remove(),1000);
}

function watchAds(){
balance+=5;
save();update();
}

function daily(){
balance+=30;
save();update();
}

function update(){
document.getElementById("balance").innerText=balance;
document.getElementById("tapLeft").innerText=limit-tapUsed;
document.getElementById("usd").innerText="$"+(balance*0.002).toFixed(2);
}

function save(){
localStorage.setItem("bal",balance);
localStorage.setItem("tap",tapUsed);
localStorage.setItem("time",last);
}

function showPage(p){
document.querySelectorAll("#home,#task,#wallet").forEach(e=>e.classList.add("hidden"));
document.getElementById(p).classList.remove("hidden");
}

update();

</script>

</body>
  </html>
