<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BGC App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
}

.container { padding: 15px; padding-bottom: 80px; }

.card {
  background: rgba(30,41,59,0.7);
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
  text-align: center;
  box-shadow: 0 0 15px rgba(147,51,234,0.4);
}

.btn {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg,#3b82f6,#9333ea);
  color: white;
}

.tap-btn {
  font-size: 28px;
  padding: 40px;
  border-radius: 50%;
  background: radial-gradient(circle,#9333ea,#3b82f6);
  box-shadow: 0 0 30px #9333ea;
}

.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #1e293b;
  display: flex;
  justify-content: space-around;
}

.hidden { display: none; }
</style>
</head>

<body>

<!-- START -->
<div id="startScreen" class="container">
  <div class="card">
    <h1>🚀 BGC PROJECT</h1>
    <button class="btn" onclick="startApp()">Start</button>
    <button class="btn" onclick="joinChannel()">Join Channel</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
<div class="container">

<div id="home">
  <div class="card">
    <h2>BGC DASHBOARD</h2>
    <p id="username">User</p>
    <p>Balance: <span id="balance">0</span></p>
    <p>Tap Left: <span id="tapLeft">50</span></p>
    <p>Level: <span id="level">1</span></p>
    <p>Mining: <span id="mining">1</span>/min</p>
  </div>

  <div class="card">
    <button class="tap-btn" onclick="tap()">TAP</button>
    <p id="cooldown"></p>
  </div>

  <button class="btn" onclick="dailyReward()">🎁 Daily</button>
  <button class="btn" onclick="showPage('tasks')">Mission</button>
</div>

<div id="tasks" class="hidden">
  <div class="card">
    <h3>Tasks</h3>
    <button class="btn" onclick="addBalance(20)">Watch Ads +20</button>
  </div>
</div>

<div id="invite" class="hidden">
  <div class="card">
    <h3>Invite</h3>
    <button class="btn" onclick="invite()">Copy Link</button>
  </div>
</div>

</div>

<div class="nav">
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('tasks')">Tasks</button>
  <button onclick="showPage('invite')">Invite</button>
</div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();

// DATA
let balance = localStorage.getItem("bgc") || 0;
let taps = localStorage.getItem("taps") || 50;
let lastTap = localStorage.getItem("lastTap") || 0;

let level = localStorage.getItem("level") || 1;
let miningRate = localStorage.getItem("miningRate") || 1;
let lastClaim = localStorage.getItem("lastClaim") || Date.now();

// USER
if (tg.initDataUnsafe.user) {
  document.getElementById("username").innerText =
    tg.initDataUnsafe.user.first_name;
}

// START
function startApp() {
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
}

// CHANNEL
function joinChannel() {
  window.open("https://t.me/BGC7COMMUNITY");
}

// TAP
function tap() {
  if (taps <= 0) {
    alert("Limit habis, tunggu 12 jam");
    return;
  }

  balance++;
  taps--;

  save();
  checkLevel();
  updateUI();
}

// AUTO MINING
function autoMining() {
  let now = Date.now();
  let diff = now - lastClaim;

  let minutes = Math.floor(diff / 60000);
  if (minutes > 0) {
    balance += minutes * miningRate;
    lastClaim = now;

    localStorage.setItem("lastClaim", lastClaim);
    save();
  }
}

// LEVEL
function checkLevel() {
  if (balance >= level * 100) {
    level++;
    miningRate++;
    alert("Level UP!");

    localStorage.setItem("level", level);
    localStorage.setItem("miningRate", miningRate);
  }
}

// DAILY
let lastDaily = localStorage.getItem("daily") || 0;

function dailyReward() {
  let now = Date.now();

  if (now - lastDaily < 86400000) {
    alert("Sudah claim hari ini");
    return;
  }

  let reward = Math.floor(Math.random() * 100) + 10;
  balance += reward;

  lastDaily = now;
  localStorage.setItem("daily", lastDaily);

  save();
  updateUI();

  alert("Dapat " + reward + " BGC");
}

// ADD
function addBalance(amount) {
  balance += amount;
  save();
  checkLevel();
  updateUI();
}

// INVITE
function invite() {
  let link = "https://t.me/bgc7_bot";
  navigator.clipboard.writeText(link);
  alert("Copied!");
}

// SAVE
function save() {
  localStorage.setItem("bgc", balance);
  localStorage.setItem("taps", taps);
}

// UI
function updateUI() {
  document.getElementById("balance").innerText = balance;
  document.getElementById("tapLeft").innerText = taps;
  document.getElementById("level").innerText = level;
  document.getElementById("mining").innerText = miningRate;
}

// NAV
function showPage(page) {
  ["home","tasks","invite"].forEach(id =>
    document.getElementById(id).classList.add("hidden")
  );
  document.getElementById(page).classList.remove("hidden");
}

// INIT
autoMining();
updateUI();
</script>

</body>
</html>
