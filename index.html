<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGC App</title>

<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle,#0b1220,#020617);
color:white;
}

.header{
display:flex;
align-items:center;
gap:10px;
padding:10px;
}

.header img{
width:40px;
height:40px;
border-radius:50%;
}

.container{
padding:15px;
padding-bottom:100px;
}

.card{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:20px;
margin-bottom:10px;
}

.tap-btn{
width:180px;
height:180px;
border-radius:50%;
display:block;
margin:20px auto;
animation:glow 2s infinite;
transition:0.1s;
}

.tap-btn:active{
transform:scale(0.9) rotate(10deg);
}

@keyframes glow{
0%{box-shadow:0 0 20px #9333ea;}
50%{box-shadow:0 0 60px #00f0ff;}
100%{box-shadow:0 0 20px #9333ea;}
}

.btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:#3b82f6;
color:white;
font-weight:bold;
}

.nav{
position:fixed;
bottom:0;
width:100%;
background:#020617;
display:flex;
justify-content:space-around;
padding:10px;
}

.hidden{display:none;}

@keyframes fly{
0%{opacity:1;transform:translateY(0);}
100%{opacity:0;transform:translateY(-50px);}
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<img src="https://i.imgur.com/YOURLOGO.png">
<span id="username">Player</span>
</div>

<div class="container">

<!-- HOME -->
<div id="home">
<div class="card">
<h2>BGC Dashboard</h2>
<p>Balance: <span id="balance">0</span> BGC</p>
<p>Limit: <span id="limit">50</span>/12h</p>
</div>

<button class="btn" onclick="spin()">🎁 Spin Reward</button>

<img src="https://i.imgur.com/YOURLOGO.png" class="tap-btn" onclick="tap(event)">

</div>

<!-- TASK -->
<div id="task" class="hidden">
<div class="card">
<h3>📋 Tasks</h3>
<p>Join Channel</p>
<button class="btn" onclick="window.open('https://t.me/BGC7COMMUNITY')">Join</button>
</div>
</div>

<!-- INVITE -->
<div id="invite" class="hidden">
<div class="card">
<h3>👥 Invite</h3>
<p>1 = 5 BGC</p>
<p>3 = 18 BGC</p>
<p>10 = 80 BGC</p>
<button class="btn">Copy Link</button>
</div>
</div>

<!-- NFT -->
<div id="nft" class="hidden">
<div class="card">
<h3>💎 NFT Market</h3>
<p>Coming Soon 🚀</p>
<button class="btn">Mint NFT</button>
</div>
</div>

<!-- WALLET -->
<div id="wallet" class="hidden">
<div class="card">
<h3>💳 Wallet</h3>
<p>BTC • ETH • USDT • TON • BNB</p>
<p>500 BGC = 1 TON</p>
<p style="opacity:0.5;">Withdraw Coming Soon</p>
</div>
</div>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="showPage('home')">🏠</button>
<button onclick="showPage('task')">📋</button>
<button onclick="showPage('invite')">👥</button>
<button onclick="showPage('nft')">💎</button>
<button onclick="showPage('wallet')">💳</button>
</div>

<script>

let balance = Number(localStorage.getItem("bal"))||0;
let limit = Number(localStorage.getItem("limit"))||50;
let used = Number(localStorage.getItem("used"))||0;
let last = Number(localStorage.getItem("last"))||0;

function save(){
localStorage.setItem("bal",balance);
localStorage.setItem("limit",limit);
localStorage.setItem("used",used);
localStorage.setItem("last",last);
}

function update(){
document.getElementById("balance").innerText = balance;
document.getElementById("limit").innerText = limit-used;
}

function tap(e){

if(Date.now()-last>43200000){
used=0;
last=Date.now();
}

if(used>=limit){
alert("Limit habis tunggu 12 jam");
return;
}

balance++;
used++;

let x = e.clientX;
let y = e.clientY;

spawn(x,y);

navigator.vibrate(30);

save();
update();
}

function spawn(x,y){
let c=document.createElement("div");
c.innerText="+1";
c.style.position="fixed";
c.style.left=x+"px";
c.style.top=y+"px";
c.style.color="#00ffcc";
c.style.fontWeight="bold";
c.style.animation="fly 1s forwards";
document.body.appendChild(c);
setTimeout(()=>c.remove(),1000);
}

function spin(){
let r = Math.floor(Math.random()*50)+10;
balance+=r;
alert("Dapet "+r+" BGC 🎉");
save();
update();
}

function showPage(p){
document.querySelectorAll("#home,#task,#invite,#nft,#wallet").forEach(el=>el.classList.add("hidden"));
document.getElementById(p).classList.remove("hidden");
}

document.getElementById("username").innerText="User_"+Math.floor(Math.random()*9999);

update();

</script>

</body>
  </html>
